        body{

            background-image: linear-gradient(to right, #000 40%, tomato 40%);
            background-image: linear-gradient(to right, purple 0%, purple 60%, black 60%, black 75%, tomato 75%, tomato 100%);
            background-image: conic-gradient( cyan 60%, black 60%, black 75%, tomato 75%); */
            /* background-color: rgb(0,0,0 ); */
        }
        div{
            background-color: rgba(5, 52, 192, 0.748);
            background-image: 
            url(https://images.unsplash.com/photo-1683009427598-9c21a169f98f?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D),

            url(./m1.png);
            background-size: 300px;
            background-position:50px 0, center, bottom right;
            background-repeat: repeat-x, repeat-y, no-repeat;
            background-blend-mode: exclusion;
        }

        section{
            width: 500px;
            height: 500px;
            border: 12px solid crimson;
            /* background-image */
            background-image: linear-gradient(90deg,green 33.3%, white 33.3%, white 66.6%, green 66.6%);
            background-image: radial-gradient(circle, red 30%, white 30%);
        }

        h1:nth-of-type(1) {
            color: transparent;
            font-size: 13rem;
            text-align: center;
            background-clip: text;
        }
        h1:nth-of-type(2) {
            color: #0f0;
        }
        h1:nth-of-type(3) {
            color: #040;
            background-color: url(./loops.webp);
        }
        h1:nth-of-type(5) {
            color: #0f3;
            background-color: rgb(255,255,255);
        }
        h1:nth-of-type(4) {
            color: #1f5;
            background-color: rgb(255,100,0);
        }
        h1:nth-of-type(6) {
            color: #050;
            background-color: #1f5;
        }
    </style>
</head>
<body>
    <div>
        <h1>different colour schemes</h1>
    </div>
    <section></section>
